services:
  # ─── 資料庫 ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kidswear_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kidswear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kidswear_dev}
      POSTGRES_DB: ${POSTGRES_DB:-kidswear}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kidswear} -d ${POSTGRES_DB:-kidswear}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 快取 / 佇列 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kidswear_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 前端 ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kidswear_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:4000}
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 後端 API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kidswear_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kidswear}:${POSTGRES_PASSWORD:-kidswear_dev}@postgres:5432/${POSTGRES_DB:-kidswear}
      - REDIS_URL=redis://redis:6379
      - RECOMMENDER_URL=http://recommender:8000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CALLBACK_URL=${LINE_CALLBACK_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-kidswear-products}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minio}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio123}
      - S3_BUCKET=${MINIO_BUCKET:-kidswear-products}
      - S3_PUBLIC_URL=http://localhost:9000/${MINIO_BUCKET:-kidswear-products}
      - S3_REGION=us-east-1
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── 物件儲存（MinIO）────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: kidswear_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web Console
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO 初始化（建立 bucket）──────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: kidswear_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123};
        mc mb --ignore-existing local/${MINIO_BUCKET:-kidswear-products};
        mc anonymous set download local/${MINIO_BUCKET:-kidswear-products};
        exit 0;
      "

  # ─── 推薦微服務 ───────────────────────────────────────────
  recommender:
    build:
      context: ./recommender
      dockerfile: Dockerfile
    container_name: kidswear_recommender
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kidswear}:${POSTGRES_PASSWORD:-kidswear_dev}@postgres:5432/${POSTGRES_DB:-kidswear}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - clip_models:/app/models
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ────────────────────────────────────────
  celery_worker:
    build:
      context: ./recommender
      dockerfile: Dockerfile
    container_name: kidswear_celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kidswear}:${POSTGRES_PASSWORD:-kidswear_dev}@postgres:5432/${POSTGRES_DB:-kidswear}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - clip_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat（定時排程）───────────────────────────────
  celery_beat:
    build:
      context: ./recommender
      dockerfile: Dockerfile
    container_name: kidswear_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-kidswear}:${POSTGRES_PASSWORD:-kidswear_dev}@postgres:5432/${POSTGRES_DB:-kidswear}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  clip_models:
  minio_data:
